<html>
  <head>
    <title>Text Formating Tags</title>
  </head>
  <body>
    <!-- 
            <i> :- itallic tag
            <em> :- empharesed tag (same as italic) (importance is higher than italic)
            <b>  :- bold
            <strong> :- strong (same as bold) (importance is higher than bold)
            <mark> :- mark  
            <del> :- delete
            <sub> :- subscript
            <sup> : superscript
            <ins> : inserted
            <small> : small
            <u> : underline 
        -->

    <p>
      <i> Lorem ipsum dolor sit amet consectetur </i> adipisicing elit.
      <b> Corporis, delectus, quasi incidunt </b> <small>itaque atque </small>
      <mark>qui reprehenderit magni </mark>
      <del> ducimus rerum maxime expedita </del>ipsa
      <ins>laborum voluptatum facilis architecto.</ins>
      <u>Aut illo reiciendis facilis! </u>
    </p>

    <h1>2<sup>3</sup></h1>

    <h2>H<sub>2</sub>O</h2>
  </body>
</html>
