<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .head {
        border: 5px solid green;
        /* padding-left: 10px;
        padding-top: 30px; */

        /* 
            single parameter/value :- four side.
            two values :- top-bottom , left-right
            third values :- top , left-right , bottom
            four values :- clockwise 
        */
        padding: 20px;
        padding: 20px 30px;
        padding: 10px 20px 30px;
        padding: 10px 20px 30px 40px;

        margin: 20px;
        margin-top: 200px;
      }
    </style>
  </head>
  <body>
    <!-- 
        border :- a line around our content.
        padding :- a space around our content.
        margin :- a space between our content and outer element.
        margin :- a outer space of our content.  

    -->

    <h1 class="head">Manoj</h1>
  </body>
</html>
