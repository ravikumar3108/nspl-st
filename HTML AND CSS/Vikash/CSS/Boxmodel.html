<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      /*
        content :- files and text
        border:- a line around our content.
        padding: a space btw content and border
        margin :- outer space of our border/element.
        margin :- a space btw our content or outer content

        */

      h1 {
        border: 10px double red;
        /* padding-left: 200px;
        padding-top: 100px; */

        /* 
            1 parameter :- all side
            2 parameter :- top bottom , left right
            3 parameter :- top , left right , botttom
            4 paramter :- clockwise top....
        */

        padding: 20px;
        padding: 20px 30px;
        padding: 10px 20px 30px;
        padding: 10px 20px 30px 40px;

        margin: 40px;
      }
    </style>
  </head>
  <body>
    <h1>Heading</h1>
  </body>
</html>
