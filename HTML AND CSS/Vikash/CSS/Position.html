<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .main {
        border: 1px solid;
        width: 100%;
        height: 400px;
        margin-top: 100px;
      }
      .box {
        border: 1px solid;
        width: 200px;
        height: 200px;
        background-color: red;
        position: relative;
        top: -100px;
        left: 200px;
      }
      .box1 {
        border: 1px solid;
        width: 100px;
        height: 100px;
        background-color: green;
        position: fixed;
        bottom: 100px;
        right: 100px;
      }
      .box2{
         border: 1px solid;
        width: 100px;
        height: 100px;
      }

      /* Header:------- */
      .header{
        position: sticky;
        top: 0px;
        left: 0px;
      }


    </style>
  </head>
  <body>
    <!-- 
        Relative
        Absolute 
        Fixed
        Sticky
    -->

    <div class="main">
      <div class="box"></div>
      <div class="box1"></div>
      <div class="box2"></div>
    </div>
    <div class="main"></div>
    <div class="main"></div>
    <div class="main"></div>
    <div class="main"></div>
    <div class="main"></div>
    <div class="main"></div>
  </body>
</html>
