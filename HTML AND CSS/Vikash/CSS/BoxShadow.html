<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        margin: auto;
      }
      .main-box {
        display: flex;
        margin-top: 100px;
        margin-bottom: 100px;
      }
      .main {
        height: 400px;
        border: 1px solid;
        margin-bottom: 100px;
        background-image: linear-gradient(red, green);
      }
      .main-img {
        height: 500px;
        border: 1px solid;
        margin-bottom: 100px;
        background-image: linear-gradient(#0c0b0bd6, #000000b3),url("https://media.istockphoto.com/id/1317323736/photo/a-view-up-into-the-trees-direction-sky.jpg?s=1024x1024&w=is&k=20&c=9Qfj9S124ojed7s4OWu3a3vbbMC76QYkqczg4L4M-Sc=");
        background-size: cover;
      }
      h1{
        color: white;
      }
      .box {
        width: 30%;
        height: 300px;
        border: 1px solid;
        box-shadow: 10px 20px;
        border-radius: 20px;
      }
      .box1 {
        width: 30%;
        height: 300px;
        border: 1px solid;
        box-shadow: 0px 0px 6px 10px rgb(1, 104, 6);
        border-radius: 20px;
      }
    </style>
  </head>
  <body>
    <div class="main-box">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>

    <div class="main-box">
      <div class="box1"></div>
      <div class="box1"></div>
      <div class="box1"></div>
    </div>

    <div class="main"></div>

    <div class="main-img">
        <h1>hwlooo</h1>
        <h1>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Numquam accusamus quis, non velit autem ullam aperiam voluptatem iure assumenda consequuntur minima nemo. Voluptatibus doloribus quia blanditiis nulla eligendi! Ab, neque.</h1>
    </div>
  </body>
</html>
