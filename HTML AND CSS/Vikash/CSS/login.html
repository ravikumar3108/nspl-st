<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .main {
        background-color: aqua;
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .form-div{
        width: 50%;
      }
      form {
        border: 1px solid;
        padding:50px 20px;
        text-align: center;
        height: 400px;
        background-color: white;
        border-radius: 10px;
      }
      .form-div input {
        margin: 10px 20px;
        padding: 10px 20px;
        border-radius: 10px;
        width: 80%;
        border-color: blueviolet;
      }
      .btn{
        padding: 10px 15px;
        background-color: green;
        color: white;
        border: none;
        border-radius: 10px;
        width: 30%;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="form-div">
        <form action="">
            <h1>Signup Form</h1>
          <div>
            <input type="text" name="" id="" placeholder="FirstName" />
          </div>
          <div>
            <input type="text" name="" id="" placeholder="LastName" />
          </div>
          <div>
            <input type="text" name="" id="" placeholder="Password" />
          </div>
          <button type="submit" class="btn">Signup</button>
          <p>Already have an Account <a href="">Login..</a></p>
        </form>
      </div>
    </div>
  </body>
</html>
